services:
  db:
    image: mysql:8.0
    container_name: gsb_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gsbrapports
      MYSQL_USER: ADN
      MYSQL_PASSWORD: FeKl%KfF*Bp6J:p$:%NF
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gsb_network

  app:
    image: node:22.20.0
    container_name: gsb_app
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://ADN:FeKl%KfF*Bp6J:p$:%NF@db:3306/gsbrapports
    command: bash -c "apt-get update && apt-get install -y default-mysql-client && npm install && bash scripts/init-db.sh"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gsb_network

  adminer:
    image: adminer:latest
    container_name: gsb_adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    networks:
      - gsb_network

volumes:
  db_data:

networks:
  gsb_network:
    driver: bridge
